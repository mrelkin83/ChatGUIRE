services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: chatguire-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-saas_omnichannel}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - chatguire-net

  redis:
    image: redis:7-alpine
    container_name: chatguire-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - chatguire-net

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: chatguire-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASS}@postgres:5432/${DB_NAME}
      - EVOLUTION_API_URL=http://evolution-api:8080
      - WAHA_API_URL=http://waha:3000
      - INSTAGRAM_BRIDGE_URL=http://instagram-bridge:8000
    ports:
      - "${API_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - chatguire-net

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: chatguire-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_BASE_URL=${API_BASE_URL:-http://localhost:3001}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - chatguire-net

  evolution-api:
    image: atendai/evolution-api:v2.1.1
    container_name: chatguire-evolution
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_GLOBAL_KEY:-change-me}
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://${DB_USER:-postgres}:${DB_PASS:-postgres}@postgres:5432/${DB_NAME:-saas_omnichannel}
      - DATABASE_CONNECTION_CLIENT_NAME=evolution
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/1
      - CACHE_REDIS_PREFIX_KEY=evo
      - CACHE_LOCAL_ENABLED=false
      - SERVER_URL=http://evolution-api:8080
      - QRCODE_LIMIT=6
      - WEBHOOK_GLOBAL_URL=${API_BASE_URL:-http://localhost:3001}/api/webhooks/evolution
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS=false
      - WEBHOOK_EVENTS_QRCODE_UPDATED=true
      - WEBHOOK_EVENTS_MESSAGES_UPSERT=true
      - WEBHOOK_EVENTS_MESSAGES_UPDATE=true
      - WEBHOOK_EVENTS_CONNECTION_UPDATE=true
      - WEBHOOK_EVENTS_SEND_MESSAGE=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - chatguire-net

  waha:
    image: devlikeapro/waha:chrome-2026.1.1
    container_name: chatguire-waha
    restart: unless-stopped
    ports:
      - "3100:3000"
    environment:
      - WHATSAPP_DEFAULT_ENGINE=${WAHA_ENGINE:-WEBJS}
      - WAHA_WEBHOOK_URL=${API_BASE_URL:-http://localhost:3001}/api/webhooks/waha
      - WAHA_WEBHOOK_EVENTS=message
    networks:
      - chatguire-net

  instagram-bridge:
    build:
      context: ./apps/instagram-bridge
      dockerfile: Dockerfile
    container_name: chatguire-instagram-bridge
    restart: unless-stopped
    environment:
      - BRIDGE_SECRET=${BRIDGE_SECRET}
    ports:
      - "${INSTAGRAM_BRIDGE_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - chatguire-net

  # ─── Campaign Worker ───────────────────────────────────────────────────────
  campaign-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.campaign-worker
    container_name: chatguire-campaign-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASS}@postgres:5432/${DB_NAME}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 256m
    memswap_limit: 256m
    cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - chatguire-net

volumes:
  pgdata:
  redisdata:

networks:
  chatguire-net:
    driver: bridge
