# ChatGÜIRE — Docker Compose Producción v1.1
# FIXES: C-6 (sin fallback changeme), A-3 (mem_limit), A-4 (versiones pinedas)
#        M-9 (rotación logs), B-1 (version eliminada), A-2 (redis password)

services:
  # ─── API Principal ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - EVOLUTION_API_URL=http://evolution-api:8080
      - WAHA_API_URL=http://waha:3000
      - INSTAGRAM_BRIDGE_URL=http://instagram-bridge:8000
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads:rw
      - ./logs:/app/logs:rw
    # FIX A-3: mem_limit funciona en Docker Compose standalone (deploy.resources no)
    mem_limit: 1g
    memswap_limit: 1g
    cpus: '1.5'
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    # FIX M-9: Rotación de logs
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service_name"
        env: "OS_VERSION"
    networks:
      - chatguire-network

  # ─── Frontend ─────────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      api:
        condition: service_healthy
    mem_limit: 512m
    memswap_limit: 512m
    cpus: '0.5'
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - chatguire-network

  # ─── PostgreSQL + pgvector ─────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backups:/backups:rw
    mem_limit: 1g
    memswap_limit: 1g
    cpus: '1.0'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "5"
    networks:
      - chatguire-network

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # FIX A-2: Redis con contraseña
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    env_file: .env
    volumes:
      - redis-data:/data
    mem_limit: 384m
    memswap_limit: 384m
    cpus: '0.25'
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - chatguire-network

  # ─── WAHA (WhatsApp) ──────────────────────────────────────────────────────
  waha:
    image: devlikeapro/waha:chrome-2026.1.1
    restart: unless-stopped
    env_file: .env
    environment:
      - WAHA_ENVIRONMENT=production
      - WHATSAPP_DEFAULT_ENGINE=${WAHA_ENGINE:-WEBJS}
      - WAHA_WEBHOOK_URL=${API_BASE_URL}/api/webhooks/waha
      - WAHA_WEBHOOK_EVENTS=message
    volumes:
      - waha-data:/app/data
    mem_limit: 1.5g
    memswap_limit: 1.5g
    cpus: '1.0'
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - chatguire-network

  # ─── Evolution API (WhatsApp alternativo) ─────────────────────────────────
  evolution-api:
    # FIX A-4: Versión pineada (cambiar a la versión que uses)
    image: atendai/evolution-api:v2.1.1
    restart: unless-stopped
    env_file: .env
    environment:
      - SERVER_URL=https://${DOMAIN}
      - AUTHENTICATION_API_KEY=${JWT_SECRET}
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=${DATABASE_URL}
      - DATABASE_CONNECTION_CLIENT_NAME=evolution
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=${REDIS_URL}
      - CACHE_REDIS_PREFIX_KEY=evo
      - CACHE_LOCAL_ENABLED=false
      - QRCODE_LIMIT=6
      - WEBHOOK_GLOBAL_URL=${API_BASE_URL}/api/webhooks/evolution
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS=false
      - WEBHOOK_EVENTS_QRCODE_UPDATED=true
      - WEBHOOK_EVENTS_MESSAGES_UPSERT=true
      - WEBHOOK_EVENTS_MESSAGES_UPDATE=true
      - WEBHOOK_EVENTS_CONNECTION_UPDATE=true
      - WEBHOOK_EVENTS_SEND_MESSAGE=true
    volumes:
      - evolution-data:/app/data
    mem_limit: 1g
    memswap_limit: 1g
    cpus: '0.75'
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - chatguire-network

  # ─── Instagram Bridge (opcional) ──────────────────────────────────────────
  instagram-bridge:
    build:
      context: ./apps/instagram-bridge
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - BRIDGE_SECRET=${BRIDGE_SECRET}
    mem_limit: 512m
    memswap_limit: 512m
    cpus: '0.5'
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - chatguire-network

  campaign-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.campaign-worker
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 256m
    memswap_limit: 256m
    cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - chatguire-network

volumes:
  postgres-data:
  redis-data:
  waha-data:
  evolution-data:

networks:
  chatguire-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
